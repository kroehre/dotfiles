set -g default-terminal "screen-256color"
setw -g mouse on
set -sg escape-time 0
set -g status off

# Toggle focus between claude and project panes
bind -n M-z select-pane -t :.+

# Zoom/unzoom current pane
bind -n M-f resize-pane -Z

# Detach
bind -n M-d detach-client

# Forward C-z <key> to the project pane (:.1) so you can
# switch project windows without unfocusing claude
bind -n C-z switch-client -T forward
bind -T forward C-z send-keys -t :.1 C-z C-z
bind -T forward 0 send-keys -t :.1 C-z 0
bind -T forward 1 send-keys -t :.1 C-z 1
bind -T forward 2 send-keys -t :.1 C-z 2
bind -T forward 3 send-keys -t :.1 C-z 3
bind -T forward 4 send-keys -t :.1 C-z 4
bind -T forward 5 send-keys -t :.1 C-z 5
bind -T forward 6 send-keys -t :.1 C-z 6
bind -T forward 7 send-keys -t :.1 C-z 7
bind -T forward 8 send-keys -t :.1 C-z 8
bind -T forward 9 send-keys -t :.1 C-z 9
bind -T forward n send-keys -t :.1 C-z n
bind -T forward p send-keys -t :.1 C-z p
bind -T forward c send-keys -t :.1 C-z c
bind -T forward ` send-keys -t :.1 C-z `
bind -T forward & send-keys -t :.1 C-z &
bind -T forward x send-keys -t :.1 C-z x
